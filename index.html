<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>雀魂ガチャで雀士を1人も引けない確率計算機</title>

<style>
body {
  font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
  background: #0f172a;
  color: #e2e8f0;
  display: flex;
  justify-content: center;
  align-items: center;
  min-height: 100vh;
}

.card {
  background: #1e293b;
  padding: 20px;
  border-radius: 16px;
  width: 320px;
  box-shadow: 0 10px 30px rgba(0,0,0,0.4);
}

h1 {
  font-size: 15px;
  margin-bottom: 12px;
}

/* 入力表示 */
.display {
  background: #0b1220;
  padding: 10px;
  border-radius: 10px;
  font-size: 18px;
  margin-bottom: 8px;
  display: flex;
  justify-content: space-between;
  align-items: center;
  border: 2px solid transparent;
}

.display.active {
  border-color: #38bdf8;
}

.label {
  font-size: 12px;
  color: #94a3b8;
}

.value {
  font-size: 18px;
}

.unit {
  font-size: 12px;
  color: #64748b;
  margin-left: 4px;
}

/* キーパッド */
.pad {
  display: grid;
  grid-template-columns: repeat(3, 1fr);
  gap: 8px;
  margin-top: 10px;
}

button {
  padding: 12px;
  font-size: 16px;
  border: none;
  border-radius: 10px;
  background: #334155;
  color: white;
  cursor: pointer;
}

button:hover {
  background: #475569;
}

/* 操作ボタン */
.controls {
  display: flex;
  gap: 8px;
  margin-top: 12px;
}

.control {
  flex: 1;
  background: #38bdf8;
  color: #0b1220;
  font-weight: bold;
}

/* 結果 */
.result {
  margin-top: 14px;
  padding: 12px;
  background: #0b1220;
  border-radius: 10px;
  text-align: center;
}

.big {
  font-size: 22px;
  color: #38bdf8;
  font-weight: bold;
}
</style>
</head>

<body>

<div class="card">
  <h1>雀魂ガチャで雀士を1人も引けない確率計算機</h1>

  <!-- 表示 -->
  <div id="disp10" class="display active">
    <span class="label">10連</span>
    <span class="value"><span id="val10">0</span><span class="unit">回</span></span>
  </div>

  <div id="disp1" class="display">
    <span class="label">単発</span>
    <span class="value"><span id="val1">0</span><span class="unit">回</span></span>
  </div>

  <!-- キーパッド -->
  <div class="pad">
    <button onclick="press(1)">1</button>
    <button onclick="press(2)">2</button>
    <button onclick="press(3)">3</button>
    <button onclick="press(4)">4</button>
    <button onclick="press(5)">5</button>
    <button onclick="press(6)">6</button>
    <button onclick="press(7)">7</button>
    <button onclick="press(8)">8</button>
    <button onclick="press(9)">9</button>
    <button onclick="clearInput()">C</button>
    <button onclick="press(0)">0</button>
    <button onclick="back()">←</button>
  </div>

  <!-- 操作ボタン -->
  <div class="controls">
    <button class="control" onclick="switchTarget()">入力切替</button>
    <button class="control" onclick="calc()">計算</button>
  </div>

  <!-- 結果 -->
  <div class="result">
    雀士0の確率
    <div id="output" class="big">-</div>
  </div>
</div>

<script>
let target = "ten";
let ten = "0";
let one = "0";

function update() {
  document.getElementById("val10").innerText = ten;
  document.getElementById("val1").innerText = one;

  document.getElementById("disp10").classList.toggle("active", target==="ten");
  document.getElementById("disp1").classList.toggle("active", target==="one");
}

function press(n) {
  if (target === "ten") {
    ten = (ten === "0") ? String(n) : ten + n;
  } else {
    one = (one === "0") ? String(n) : one + n;
  }
  update();
}

function clearInput() {
  if (target === "ten") ten = "0";
  else one = "0";
  update();
}

function back() {
  if (target === "ten") {
    ten = ten.length > 1 ? ten.slice(0,-1) : "0";
  } else {
    one = one.length > 1 ? one.slice(0,-1) : "0";
  }
  update();
}

function switchTarget() {
  target = (target === "ten") ? "one" : "ten";
  update();
}

function calc() {
  const x = Number(ten);
  const z = Number(one);

  const p = Math.pow(0.95, 9 * x + z) * 100;

  document.getElementById("output").innerText =
    p.toFixed(6) + "%";
}

update();
</script>

</body>
</html>
